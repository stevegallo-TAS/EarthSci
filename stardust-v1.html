        get: async (key) => {
          const val = localStorage.getItem(key);
          return val ? { key, value: val } : null;
        },
        set: async (key, value) => {
          localStorage.setItem(key, value);
          return { key, value };
        },
        delete: async (key) => {
          localStorage.removeItem(key);
          return { key, deleted: true };
        },
        list: async (prefix) => {
          const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));

        }

// ─── PERSISTENT STORAGE ─────────────────────────────────────────────────────

const STORAGE_KEY = "stardust-progress";
const SAVE_DELAY = 1500; // ms debounce

async function loadProgress() {
  try {
    if (!window.storage) return null;
    const result = await window.storage.get(STORAGE_KEY);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    console.log("No saved progress found");
    return null;
  }
}

async function saveProgress(data) {
  try {
    if (!window.storage) return;
    await window.storage.set(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error("Save failed:", e);
  }
}

async function clearProgress() {
  try {
    if (!window.storage) return;
    await window.storage.delete(STORAGE_KEY);
  } catch (e) {
    console.error("Clear failed:", e);
  }
}

// ─── FORGE VISUAL ───────────────────────────────────────────────────────────

function ForgeVisual({ stageIdx, size = 220 }) {
  const canvasRef = useRef(null);
  const frameRef = useRef(0);
  const stage = FUSION_STAGES[stageIdx];
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d"); let animId;
    const s = size / 220;
    const draw = () => {
      frameRef.current++; const f = frameRef.current;
      ctx.clearRect(0, 0, size, size * 0.82);
      const cx = size / 2, cy = size * 0.41;
      const bg = ctx.createRadialGradient(cx, cy, 8, cx, cy, 90 * s);
      bg.addColorStop(0, stage.color + "33"); bg.addColorStop(1, "transparent");
      ctx.beginPath(); ctx.arc(cx, cy, 90 * s, 0, Math.PI * 2); ctx.fillStyle = bg; ctx.fill();
      if (stageIdx === 0) {
        const e = Math.sin(f * 0.03) * 8;
        for (let i = 0; i < 20; i++) { const a = (i / 20) * Math.PI * 2 + f * 0.01, d = 15 + i * 2.5 + e; const g = ctx.createRadialGradient(cx + Math.cos(a) * d * s, cy + Math.sin(a) * d * s, 0, cx + Math.cos(a) * d * s, cy + Math.sin(a) * d * s, 3 * s); g.addColorStop(0, i < 12 ? "#FFF" : "#F9E547"); g.addColorStop(1, "transparent"); ctx.beginPath(); ctx.arc(cx + Math.cos(a) * d * s, cy + Math.sin(a) * d * s, 3 * s, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill(); }
        const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 15 * s + e * s / 2); cg.addColorStop(0, "#FFF"); cg.addColorStop(0.5, "#F9E547"); cg.addColorStop(1, "transparent"); ctx.beginPath(); ctx.arc(cx, cy, 15 * s + e * s / 2, 0, Math.PI * 2); ctx.fillStyle = cg; ctx.fill();
      } else if (stageIdx <= 3) {
        const p = Math.sin(f * 0.04) * 3, r = (20 + stageIdx * 10) * s + p;
        const g = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, r * 0.1, cx, cy, r); g.addColorStop(0, "#FFF"); g.addColorStop(0.3, stage.color + "CC"); g.addColorStop(1, stage.color + "44"); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
        if (stageIdx === 3) { ["#F1C40F", "#E67E22", "#E74C3C", "#C0392B"].forEach((c, li) => { const lr = r - li * 6 - 3; if (lr > 0) { ctx.beginPath(); ctx.arc(cx, cy, lr, 0, Math.PI * 2); ctx.strokeStyle = c + "88"; ctx.lineWidth = 1.5; ctx.stroke(); } }); ctx.fillStyle = "#444"; ctx.beginPath(); ctx.arc(cx, cy, 6 * s, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#FFF"; ctx.font = `bold ${6 * s}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("Fe", cx, cy); }
      } else if (stageIdx === 4) {
        const pr = (Math.sin(f * 0.025) + 1) / 2;
        for (let i = 0; i < 12; i++) { const a = (i / 12) * Math.PI * 2 + f * 0.015, d = 15 + pr * 55; const g = ctx.createRadialGradient(cx + Math.cos(a) * d * s, cy + Math.sin(a) * d * s, 0, cx + Math.cos(a) * d * s, cy + Math.sin(a) * d * s, 4 * s); g.addColorStop(0, "#FFF"); g.addColorStop(0.5, stage.color); g.addColorStop(1, "transparent"); ctx.beginPath(); ctx.arc(cx + Math.cos(a) * d * s, cy + Math.sin(a) * d * s, 4 * s, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill(); }
        const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 11 * s); core.addColorStop(0, "#FFF"); core.addColorStop(1, stage.color + "88"); ctx.beginPath(); ctx.arc(cx, cy, 11 * s, 0, Math.PI * 2); ctx.fillStyle = core; ctx.fill();
      } else {
        const o = Math.sin(f * 0.04) * 16; const x1 = cx - 18 * s + o * s, x2 = cx + 18 * s - o * s;
        [[x1, cy], [x2, cy]].forEach(p => { const ng = ctx.createRadialGradient(p[0], p[1], 0, p[0], p[1], 8 * s); ng.addColorStop(0, "#5DADE2"); ng.addColorStop(1, "#3498DB44"); ctx.beginPath(); ctx.arc(p[0], p[1], 8 * s, 0, Math.PI * 2); ctx.fillStyle = ng; ctx.fill(); });
        if (Math.abs(o) < 4) { const b = (4 - Math.abs(o)) / 4; for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2, d = b * 45 * s; const g = ctx.createRadialGradient(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 0, cx + Math.cos(a) * d, cy + Math.sin(a) * d, 3 * b * s); g.addColorStop(0, "#F9E547"); g.addColorStop(1, "transparent"); ctx.beginPath(); ctx.arc(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 3 * b * s, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill(); } }
      }
      animId = requestAnimationFrame(draw);
    }; draw(); return () => cancelAnimationFrame(animId);
  }, [stageIdx, size]);
  return <canvas ref={canvasRef} width={size} height={Math.floor(size * 0.82)} style={{ width: size, height: Math.floor(size * 0.82) }} />;
}

// ─── FUSION LAB REACTOR VISUAL ──────────────────────────────────────────────

function ReactorVisual({ stageIdx, temp, fusing, collapsed, exploding, merging }) {
  const canvasRef = useRef(null);
  const frameRef = useRef(0);
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d"); let animId;
    const draw = () => {
      frameRef.current++; const f = frameRef.current;
      const W = 300, H = 300; ctx.clearRect(0, 0, W, H);
      const cx = W / 2, cy = H / 2;

      if (exploding) {
        // Supernova explosion
        const p = Math.min(f / 60, 1);
        for (let i = 0; i < 30; i++) {
          const a = (i / 30) * Math.PI * 2 + f * 0.02 + Math.sin(i * 3) * 0.5;
          const d = p * 140;
          const x = cx + Math.cos(a) * d, y = cy + Math.sin(a) * d;
          const r = (1 - p * 0.6) * 12;
          const colors = ["#FFFFFF", "#FFE066", "#FF6B35", "#9B59B6", "#3498DB"];
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, colors[i % colors.length]); g.addColorStop(1, "transparent");
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
        }
        // Element labels flying out
        const elems = ["Co", "Cu", "Zn", "Ag", "I"];
        ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        elems.forEach((e, i) => {
          const a = (i / elems.length) * Math.PI * 2 - Math.PI / 2;
          const d = p * 100 + 20;
          ctx.fillStyle = `rgba(255,255,255,${Math.max(0, 1 - p * 0.8)})`; ctx.fillText(e, cx + Math.cos(a) * d, cy + Math.sin(a) * d);
        });
      } else if (merging) {
        // Neutron star merger
        const osc = Math.sin(f * 0.06) * 50;
        const dist = Math.max(0, Math.abs(osc));
        const x1 = cx - dist, x2 = cx + dist;
        [[x1, cy], [x2, cy]].forEach(p => {
          const ng = ctx.createRadialGradient(p[0], p[1], 0, p[0], p[1], 20);
          ng.addColorStop(0, "#5DADE2"); ng.addColorStop(1, "#3498DB44");
          ctx.beginPath(); ctx.arc(p[0], p[1], 20, 0, Math.PI * 2); ctx.fillStyle = ng; ctx.fill();
        });
        if (dist < 10) {
          const burst = (10 - dist) / 10;
          for (let i = 0; i < 16; i++) {
            const a = (i / 16) * Math.PI * 2, d2 = burst * 80;
            const g = ctx.createRadialGradient(cx + Math.cos(a) * d2, cy + Math.sin(a) * d2, 0, cx + Math.cos(a) * d2, cy + Math.sin(a) * d2, 6 * burst);
            g.addColorStop(0, "#F9E547"); g.addColorStop(1, "transparent");
            ctx.beginPath(); ctx.arc(cx + Math.cos(a) * d2, cy + Math.sin(a) * d2, 6 * burst, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
          }
          const els = ["Au", "Pt", "U"];
          ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          els.forEach((e, i) => {
            const a = (i / els.length) * Math.PI * 2 - Math.PI / 2;
            const d2 = burst * 60 + 10;
            ctx.fillStyle = `rgba(249,229,71,${burst})`; ctx.fillText(e, cx + Math.cos(a) * d2, cy + Math.sin(a) * d2);
          });
        }
      } else if (collapsed) {
        // Iron crisis collapse
        const p = Math.min(f / 40, 1);
        const r = 60 * (1 - p * 0.85);
        const shakeX = (1 - p) * (Math.random() - 0.5) * 10;
        const shakeY = (1 - p) * (Math.random() - 0.5) * 10;
        const g = ctx.createRadialGradient(cx + shakeX, cy + shakeY, 0, cx + shakeX, cy + shakeY, r);
        g.addColorStop(0, "#FFF"); g.addColorStop(0.3, "#E74C3C"); g.addColorStop(0.7, "#C0392B"); g.addColorStop(1, "rgba(192,57,43,0)");
        ctx.beginPath(); ctx.arc(cx + shakeX, cy + shakeY, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
        // Infall arrows
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          const d = 100 * (1 - p);
          ctx.beginPath(); ctx.moveTo(cx + Math.cos(a) * (d + 30), cy + Math.sin(a) * (d + 30));
          ctx.lineTo(cx + Math.cos(a) * d, cy + Math.sin(a) * d);
          ctx.strokeStyle = `rgba(231,76,60,${1 - p})`; ctx.lineWidth = 2; ctx.stroke();
        }
        ctx.fillStyle = "#FFF"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("Fe", cx + shakeX, cy + shakeY);
      } else {
        // Normal star reactor
        const stage = LAB_STAGES[stageIdx] || LAB_STAGES[0];
        const starR = 30 + (stage.starSize || 0.5) * 40;
        const heatGlow = Math.min(temp / 3000, 1);
        const pulse = Math.sin(f * 0.04) * 3;
        const r = starR + pulse;

        // Outer glow
        const outer = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 2.2);
        outer.addColorStop(0, (stage.starColor || "#F1C40F") + Math.floor(heatGlow * 60 + 10).toString(16).padStart(2, "0"));
        outer.addColorStop(1, "transparent");
        ctx.beginPath(); ctx.arc(cx, cy, r * 2.2, 0, Math.PI * 2); ctx.fillStyle = outer; ctx.fill();

        // Star body
        const sg = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, r * 0.1, cx, cy, r);
        sg.addColorStop(0, "#FFFFFF"); sg.addColorStop(0.25, stage.starColor || "#F1C40F"); sg.addColorStop(0.8, (stage.starColor || "#F1C40F") + "AA"); sg.addColorStop(1, "transparent");
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = sg; ctx.fill();

        // Onion layers for stage 3+
        if (stageIdx >= 2 && stageIdx <= 4) {
          const layers = stageIdx - 1;
          const layerColors = ["#F1C40F88", "#E67E2288", "#E74C3C88", "#C0392B88"];
          for (let l = 0; l < Math.min(layers, 4); l++) {
            const lr = r - (l + 1) * (r / (layers + 2));
            if (lr > 5) { ctx.beginPath(); ctx.arc(cx, cy, lr, 0, Math.PI * 2); ctx.strokeStyle = layerColors[l]; ctx.lineWidth = 1.5; ctx.stroke(); }
          }
        }

        // Fusing particles
        if (fusing) {
          for (let i = 0; i < 12; i++) {
            const pa = f * 0.08 + i * 0.55;
            const pd = Math.sin(f * 0.06 + i * 2) * r * 0.4 + r * 0.2;
            const px = cx + Math.cos(pa) * pd, py = cy + Math.sin(pa) * pd;
            ctx.beginPath(); ctx.arc(px, py, 2 + Math.sin(f * 0.1 + i) * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.sin(f * 0.12 + i) * 0.3})`; ctx.fill();
          }
        }

        // Temperature indicator ring
        if (temp > 0) {
          const tFrac = Math.min(temp / 5000, 1);
          ctx.beginPath();
          ctx.arc(cx, cy, r + 12, -Math.PI / 2, -Math.PI / 2 + tFrac * Math.PI * 2);
          ctx.strokeStyle = tFrac > 0.8 ? "#E74C3C" : tFrac > 0.4 ? "#F39C12" : "#F1C40F";
          ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.stroke();
        }
      }
      animId = requestAnimationFrame(draw);
    }; draw(); return () => cancelAnimationFrame(animId);
  }, [stageIdx, temp, fusing, collapsed, exploding, merging]);
  return <canvas ref={canvasRef} width={300} height={300} style={{ width: 280, height: 280 }} />;
}

// ─── WORKSHEET SUB-COMPONENTS ───────────────────────────────────────────────

function SortWidget({ answers, setAnswers }) {
  const [checked, setChecked] = useState(false);
  const origins = ["big_bang", "stellar_fusion", "supernova", "neutron_merge", "cosmic_rays"];
  const allPlaced = SORT_ITEMS.every(i => answers[i.element]);
  const score = checked ? SORT_ITEMS.filter(i => answers[i.element] === i.origin).length : 0;
  return (
    <div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 12, justifyContent: "center" }}>
        {SORT_ITEMS.filter(i => !answers[i.element]).map(i => (
          <div key={i.element} draggable onDragStart={e => e.dataTransfer.setData("el", i.element)} style={{ padding: "6px 14px", borderRadius: 7, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", color: "#CDD", cursor: "grab", fontSize: 13, fontWeight: 600 }}>{i.element}</div>
        ))}
        {allPlaced && !checked && <span style={{ fontSize: 12, color: "#556", fontStyle: "italic" }}>All placed!</span>}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 6 }}>
        {origins.map(o => {
          const ori = ORIGINS[o]; const placed = SORT_ITEMS.filter(i => answers[i.element] === o);
          return (<div key={o} onDragOver={e => e.preventDefault()} onDrop={e => { const el = e.dataTransfer.getData("el"); if (el) { setAnswers({ ...answers, [el]: o }); setChecked(false); } }}
            style={{ padding: "8px 10px", borderRadius: 8, minHeight: 60, border: "2px dashed " + ori.color + "44", background: ori.color + "08" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: ori.color, marginBottom: 4 }}>{ori.icon} {ori.short}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
              {placed.map(i => {
                const c = checked && i.origin === o, w = checked && i.origin !== o;
                return <div key={i.element} onClick={() => { const n = { ...answers }; delete n[i.element]; setAnswers(n); setChecked(false); }}
                  style={{ padding: "3px 8px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", background: c ? "rgba(46,204,113,0.2)" : w ? "rgba(231,76,60,0.2)" : "rgba(255,255,255,0.08)", color: c ? "#2ECC71" : w ? "#E74C3C" : "#AAB", border: "1px solid " + (c ? "#2ECC71" : w ? "#E74C3C44" : "rgba(255,255,255,0.1)") }}>{i.element}{c && " ✓"}{w && " ✗"}</div>;
              })}
            </div>
          </div>);
        })}
      </div>
      <div style={{ textAlign: "center", marginTop: 8 }}>
        <button onClick={() => setChecked(true)} disabled={!allPlaced} style={{ padding: "7px 18px", borderRadius: 7, border: "1px solid " + (allPlaced ? "rgba(46,204,113,0.3)" : "rgba(255,255,255,0.08)"), background: allPlaced ? "rgba(46,204,113,0.1)" : "rgba(255,255,255,0.03)", color: allPlaced ? "#2ECC71" : "#334", cursor: allPlaced ? "pointer" : "default", fontSize: 12, fontWeight: 600 }}>
          {checked ? `Score: ${score}/${SORT_ITEMS.length}${score === SORT_ITEMS.length ? " 🌟" : ""}` : "Check Answers"}
        </button>
      </div>
    </div>
  );
}

function FillInWidget({ answers, setAnswers }) {
  const items = [
    { clue: "Heaviest element created by fusion inside a star", answer: "iron", alts: ["iron", "fe"] },
    { clue: "Process that powers stars by combining lighter nuclei", answer: "fusion", alts: ["nuclear fusion", "fusion"] },
    { clue: "Event where two neutron stars collide, creating gold", answer: "kilonova", alts: ["kilonova", "neutron star merger"] },
    { clue: "Rapid neutron capture process that forges elements beyond iron", answer: "r-process", alts: ["r-process", "r process", "rapid neutron capture"] },
    { clue: "Element making up ~60% of atoms in your body, from the Big Bang", answer: "hydrogen", alts: ["hydrogen", "h"] },
    { clue: "High-energy particles that split atoms to create lithium and boron", answer: "cosmic rays", alts: ["cosmic rays", "cosmic ray", "cosmic ray fission"] },
  ];
  const [checked, setChecked] = useState({});
  const check = i => { const u = (answers[i] || "").toLowerCase().trim(); setChecked({ ...checked, [i]: items[i].alts.some(a => u === a) }); };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {items.map((item, i) => (
        <div key={i} style={{ padding: "10px 14px", borderRadius: 10, background: checked[i] === true ? "rgba(46,204,113,0.08)" : checked[i] === false ? "rgba(231,76,60,0.08)" : "rgba(255,255,255,0.03)", border: "1px solid " + (checked[i] === true ? "rgba(46,204,113,0.3)" : checked[i] === false ? "rgba(231,76,60,0.3)" : "rgba(255,255,255,0.06)") }}>
          <p style={{ margin: "0 0 6px", fontSize: 13, color: "#BCC", lineHeight: 1.3 }}>{i + 1}. {item.clue}</p>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <input type="text" value={answers[i] || ""} onChange={e => { setAnswers({ ...answers, [i]: e.target.value }); if (checked[i] !== undefined) { const c = { ...checked }; delete c[i]; setChecked(c); } }}
              onKeyDown={e => { if (e.key === "Enter") check(i); }} placeholder="Type answer…"
              style={{ flex: 1, padding: "7px 10px", borderRadius: 7, fontSize: 13, background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", color: "#ECF0F1", outline: "none" }} />
            <button onClick={() => check(i)} style={{ padding: "7px 12px", borderRadius: 7, border: "1px solid rgba(52,152,219,0.3)", background: "rgba(52,152,219,0.1)", color: "#3498DB", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Check</button>
          </div>
          {checked[i] === true && <div style={{ marginTop: 4, fontSize: 12, color: "#2ECC71", fontWeight: 600 }}>✓ Correct!</div>}
          {checked[i] === false && <div style={{ marginTop: 4, fontSize: 12, color: "#E74C3C" }}>✗ Try again</div>}
        </div>
      ))}
    </div>
  );
}

function CompareWidget({ answers, setAnswers }) {
  const [rev, setRev] = useState(false);
  return (
    <div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 0, fontSize: 12 }}>
          <thead><tr>
            <th style={{ padding: "8px 10px", background: "rgba(230,126,34,0.15)", borderRadius: "8px 0 0 0", color: "#E67E22", textAlign: "left", fontWeight: 700 }}>Category</th>
            <th style={{ padding: "8px 10px", background: "rgba(241,196,15,0.1)", color: "#F1C40F", textAlign: "left", fontWeight: 700 }}>⭐ Stellar Fusion</th>
            <th style={{ padding: "8px 10px", background: "rgba(155,89,182,0.1)", borderRadius: "0 8px 0 0", color: "#9B59B6", textAlign: "left", fontWeight: 700 }}>💥 Explosive</th>
          </tr></thead>
          <tbody>{COMPARE_CATS.map((cat, i) => (
            <tr key={i}>
              <td style={{ padding: "8px 10px", color: "#99A", fontWeight: 600, borderBottom: "1px solid rgba(255,255,255,0.04)", background: "rgba(255,255,255,0.02)" }}>{cat}</td>
              <td style={{ padding: "5px 6px", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                {rev ? <span style={{ fontSize: 12, color: "#2ECC71" }}>{COMPARE_S[i]}</span> :
                  <input type="text" value={answers["s_" + i] || ""} onChange={e => setAnswers({ ...answers, ["s_" + i]: e.target.value })} placeholder="Answer…"
                    style={{ width: "100%", padding: "5px 8px", borderRadius: 5, fontSize: 12, boxSizing: "border-box", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.08)", color: "#ECF0F1", outline: "none" }} />}
              </td>
              <td style={{ padding: "5px 6px", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                {rev ? <span style={{ fontSize: 12, color: "#2ECC71" }}>{COMPARE_E[i]}</span> :
                  <input type="text" value={answers["e_" + i] || ""} onChange={e => setAnswers({ ...answers, ["e_" + i]: e.target.value })} placeholder="Answer…"
                    style={{ width: "100%", padding: "5px 8px", borderRadius: 5, fontSize: 12, boxSizing: "border-box", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.08)", color: "#ECF0F1", outline: "none" }} />}
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{ textAlign: "center", marginTop: 10 }}>
        <button onClick={() => setRev(!rev)} style={{ padding: "7px 18px", borderRadius: 7, border: "1px solid rgba(46,204,113,0.3)", background: "rgba(46,204,113,0.1)", color: "#2ECC71", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>{rev ? "Hide Answers" : "Reveal Answers"}</button>
      </div>
    </div>
  );
}
